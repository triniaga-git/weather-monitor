name: Weekly Weather Snapshot

on:
  schedule:
    # 23:00 UTC setiap Minggu = 06:00 WIB Senin
    - cron: '0 23 * * 0'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # biar ambil histori penuh, bukan 1 commit saja
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Ambil data cuaca mingguan
        run: node scripts/fetch-weather.js

      - name: Cek cuaca ekstrem
        id: check
        run: |
          node scripts/check-extreme.js
          if [ -f "/tmp/alert-body.txt" ]; then
            echo "has_alert=true" >> "$GITHUB_OUTPUT"
            echo "recipients=$(cat /tmp/alert-recipients.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "has_alert=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit & push kalau ada perubahan
        run: |
          git config user.name "weather-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/weather-history.json data/alert-state.json
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan, skip commit"
          else
            git commit -m "chore: snapshot cuaca mingguan $(date -u +'%G-W%V')"
            git pull --rebase origin master
            git push origin master
          fi

      - name: Kirim email peringatan cuaca ekstrem
        if: steps.check.outputs.has_alert == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.ALERT_EMAIL_USER }}
          password: ${{ secrets.ALERT_EMAIL_PASS }}
          subject: "⚠️ Peringatan Cuaca Ekstrem - Global Weather Monitor"
          to: ${{ steps.check.outputs.recipients }}
          from: Global Weather Monitor
          body: file:///tmp/alert-body.txt