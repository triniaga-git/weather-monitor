name: Backfill Weather History (2000-now)

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check structure
        run: |
          echo "=== Root directory ==="
          ls -la
          echo ""
          echo "=== Scripts folder ==="
          ls -la scripts/ 2>/dev/null || echo "scripts folder not found"
          echo ""
          echo "=== Backfill script check ==="
          if [ -f "scripts/backfill-history.js" ]; then
            echo "✓ scripts/backfill-history.js found"
            echo "First 20 lines:"
            head -20 scripts/backfill-history.js
          else
            echo "✗ scripts/backfill-history.js NOT found"
            exit 1
          fi

      - name: Run backfill script with verbose output
        run: |
          echo "=== Running backfill script ==="
          node scripts/backfill-history.js
        continue-on-error: true

      - name: Check result
        run: |
          echo "=== Check data folder ==="
          ls -la data/ 2>/dev/null || echo "data folder not found"
          echo ""
          echo "=== Check weather-history.json ==="
          if [ -f "data/weather-history.json" ]; then
            echo "✓ data/weather-history.json created"
            head -50 data/weather-history.json
          else
            echo "✗ data/weather-history.json not created"
          fi

      - name: Commit & push changes
        run: |
          git config user.name "weather-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/weather-history.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: backfill histori mingguan 2000-sekarang"
            git push
            echo "✓ Changes pushed"
          else
            echo "ℹ No changes to commit"
          fi